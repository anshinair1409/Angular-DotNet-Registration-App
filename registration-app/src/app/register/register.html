<div class="container">

<h2>Student Registration Form</h2>

<form (ngSubmit)="registerUser()">

<div class="form-group">
<input type="text" [(ngModel)]="user.name" name="name" placeholder="Full Name" required>
</div>

<div class="form-group">
<input type="email" [(ngModel)]="user.email" name="email" placeholder="Email Address" required>
</div>

<div class="form-group">
<input type="password" [(ngModel)]="user.password" name="password" placeholder="Password" required>
</div>

<div class="form-group">
<input type="text" [(ngModel)]="user.phone" name="phone" placeholder="Phone Number" required>
</div>

<button type="submit">Register</button>

</form>

<p class="message">{{message}}</p>

</div>
